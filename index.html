<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ラブキャッチ完成版</title>
<style>
body { margin:0; overflow:hidden; background:#fff0f5; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🎵BGM
const bgm = new Audio("bgm.mp3");
bgm.loop = true;
bgm.volume = 0.5;

// 最初のクリックで再生
document.addEventListener("click", () => {
  bgm.play();
}, { once: true });

// 画像読み込み
const imgBaby = new Image();
imgBaby.src = "baby.png";

const imgAfro = new Image();
imgAfro.src = "afro.png";

const imgProf = new Image();
imgProf.src = "prof.png";

// 画像チェック
function drawItem(item) {
  if (item.img.complete && item.img.naturalWidth !== 0) {
    ctx.drawImage(item.img, item.x, item.y, item.size, item.size);
  } else {
    ctx.font = "40px serif";
    let emoji = "🎓";
    if (item.type === "baby") emoji = "👶";
    if (item.type === "afro") emoji = "🕺";
    ctx.fillText(emoji, item.x, item.y + 40);
  }
}

let basket = { x: canvas.width / 2, y: canvas.height - 100, w: 120, h: 30 };
let items = [];
let score = 0;

document.addEventListener("mousemove", e => {
  basket.x = e.clientX - basket.w / 2;
});

document.addEventListener("touchmove", e => {
  basket.x = e.touches[0].clientX - basket.w / 2;
});

function spawnItem() {
  let rand = Math.random();
  let type = "prof";
  let img = imgProf;
  let value = 5;

  if (rand < 0.2) {
    type = "baby";
    img = imgBaby;
    value = 30;
  } else if (rand < 0.6) {
    type = "afro";
    img = imgAfro;
    value = 10;
  }

  items.push({
    x: Math.random() * canvas.width,
    y: -80,
    size: 80,
    type: type,
    img: img,
    value: value,
    speed: 2 + Math.random() * 2
  });
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // カゴ
  ctx.fillStyle = "#ff6b81";
  ctx.fillRect(basket.x, basket.y, basket.w, basket.h);

  items.forEach((item, i) => {
    item.y += item.speed;
    drawItem(item);

    // 当たり判定
    if (
      item.y + item.size > basket.y &&
      item.x + item.size > basket.x &&
      item.x < basket.x + basket.w
    ) {
      score += item.value;

      if (item.type === "baby") {
        score += 20;
      }

      items.splice(i, 1);
    }

    if (item.y > canvas.height) {
      items.splice(i, 1);
    }
  });

  ctx.fillStyle = "#333";
  ctx.font = "28px sans-serif";
  ctx.fillText("Love: " + score, 20, 40);

  requestAnimationFrame(update);
}

setInterval(spawnItem, 900);
update();
</script>
</body>
</html>
