<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ずっとつかまえるゲーム</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#fff5f8;
  font-family:sans-serif;
}

#score {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  padding:8px 16px;
  border-radius:20px;
}

#startBtn {
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:18px 30px;
  font-size:26px;
  background:#ff6b81;
  color:#fff;
  border:none;
  border-radius:15px;
}

canvas { display:block; }
</style>
</head>

<body>

<div id="score">0</div>
<button id="startBtn">スタート！</button>
<canvas id="game"></canvas>

<audio id="sound" src="get.mp3"></audio>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const startBtn=document.getElementById("startBtn");
const scoreEl=document.getElementById("score");
const sound=document.getElementById("sound");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const files=[
"baba.png","kei.png","nagomi.png","oyako.png",
"yukinago.png","karan.png","sauaka.png","uedake.png","reiko.png"
];

let items=[];
let started=false;
let score=0;

// ================= 出現 =================
function spawn(){
  const img=new Image();
  img.src=files[Math.floor(Math.random()*files.length)];

  items.push({
    img,
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:120,
    speed:1 + score*0.02 // 徐々に速く
  });
}

// ================= 動き =================
function move(){
  items.forEach(i=>{
    i.x += (Math.random()-0.5)*i.speed*5;
    i.y += (Math.random()-0.5)*i.speed*5;

    if(i.x<0)i.x=0;
    if(i.y<0)i.y=0;
    if(i.x>canvas.width-i.size)i.x=canvas.width-i.size;
    if(i.y>canvas.height-i.size)i.y=canvas.height-i.size;
  });
}

// ================= 逃げる =================
function flee(px,py){
  items.forEach(i=>{
    const dx=i.x-px;
    const dy=i.y-py;
    const dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<120){
      i.x += dx/dist*30;
      i.y += dy/dist*30;
    }
  });
}

// ================= タップ =================
function catchCheck(px,py){
  items.forEach((i,index)=>{
    if(px>i.x && px<i.x+i.size && py>i.y && py<i.y+i.size){

      score++;
      scoreEl.textContent=score;

      sound.currentTime=0;
      sound.play();

      items.splice(index,1);
      spawn(); // すぐ次出す
    }
  });
}

// ================= 操作 =================
canvas.addEventListener("mousemove",e=>{
  if(started)flee(e.clientX,e.clientY);
});

canvas.addEventListener("touchmove",e=>{
  if(started){
    const t=e.touches[0];
    flee(t.clientX,t.clientY);
  }
},{passive:true});

canvas.addEventListener("click",e=>{
  catchCheck(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
  const t=e.touches[0];
  catchCheck(t.clientX,t.clientY);
},{passive:true});

// ================= 描画 =================
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  items.forEach(i=>{
    if(i.img.complete){
      ctx.drawImage(i.img,i.x,i.y,i.size,i.size);
    }
  });
}

// ================= ループ =================
function loop(){
  if(started){
    move();
  }
  draw();
  requestAnimationFrame(loop);
}

startBtn.onclick=()=>{
  sound.play().then(()=>{sound.pause();sound.currentTime=0});
  startBtn.style.display="none";
  started=true;

  for(let i=0;i<3;i++) spawn(); // 最初3つ
};

loop();
</script>

</body>
</html>
